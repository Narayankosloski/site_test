<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panorama Test</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #111;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: #fff;
    border-bottom: 2px solid #000;
}

.logo { font-size: 24px; font-weight: bold; }

nav a {
    color: #000;
    margin-left: 25px;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 30vh;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid #000;
}

/* SEÇÃO */
.secao {
    padding: 60px;
    max-width: 1200px;
    margin: auto;
}

/* EXPOSIÇÕES */
.exposicao {
    display: flex;
    gap: 40px;
    margin-bottom: 60px;
    align-items: center;
    border: 3px solid #000;
    padding: 30px;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER ZOOM */
.exposicao img {
    width: 500px;
    height: 320px;
    object-fit: cover;
    border: 3px solid #000;
    transition: transform 0.4s ease;
}

.exposicao:hover img {
    transform: scale(1.08);
}

.exposicao:hover {
    background: #f5f5f5;
}

.exposicao-texto { flex: 1; }

/* PANORAMA */
#panorama {
    width: 100%;
    height: 500px;
    border: 2px solid #000;
}

/* BOTÕES */
.scene-selector {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
}

.scene-btn {
    padding: 10px 18px;
    background: #000;
    color: #fff;
    border-radius: 20px;
    cursor: pointer;
}

/* BOTÃO TOPO */
#voltarTopo {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #000;
    padding: 18px;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
}
</style>
</head>

<body id="topo">

<header>
    <div class="logo">Panorama Test</div>
    <nav>
        <a href="#expo">Exposição</a>
        <a href="#viewer">Explorar</a>
    </nav>
</header>

<!-- EXPOSIÇÃO -->
<section id="expo" class="secao">
    <h2>Exposição</h2>

    <div class="exposicao" onclick="irParaCena(0, 0, 45)">
        <img src="https://picsum.photos/600/400">
        <div class="exposicao-texto">
            <h3>Obra 1</h3>
            <p>Clique para visualizar no panorama.</p>
        </div>
    </div>

    <div class="exposicao" onclick="irParaCena(1, 10, 90)">
        <img src="https://picsum.photos/601/400">
        <div class="exposicao-texto">
            <h3>Obra 2</h3>
            <p>Essa obra está em outro ambiente.</p>
        </div>
    </div>

</section>

<section class="hero">
    <h1>Museu de Exposições</h1>
</section>

<section id="viewer" class="secao">
    <h2>Explorar Ambientes</h2>
    <div class="scene-selector" id="sceneSelector"></div>
    <div id="panorama"></div>
</section>

<button id="voltarTopo">↑</button>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
const scenes = [
    {
        name: "Espaço 1",
        image: "https://i.postimg.cc/rwfXz5wh/panorama-01.jpg",
        hotspots: [
            { title: "Modelo 3D", link: "https://sketchfab.com", pitch: 0, yaw: 45 }
        ]
    },
    {
        name: "Espaço 2",
        image: "https://i.postimg.cc/SsTJrndH/panorama-02.jpg",
        hotspots: [
            { title: "Explorar", link: "https://exemplo.com", pitch: 10, yaw: 90 }
        ]
    },
    {
        name: "Espaço 3",
        image: "https://i.postimg.cc/pLfrSGkY/panorama-03.jpg",
        hotspots: []
    }
];

let viewer = null;

function init() {
    const selector = document.getElementById('sceneSelector');

    scenes.forEach((scene, i) => {
        const btn = document.createElement('button');
        btn.className = 'scene-btn';
        btn.textContent = scene.name;
        btn.onclick = () => loadScene(i);
        selector.appendChild(btn);
    });

    loadScene(0);
}

/* NOVA FUNÇÃO: IR PARA OBRA */
function irParaCena(index, pitch, yaw) {
    loadScene(index);

    setTimeout(() => {
        viewer.lookAt(pitch, yaw, 80);
        window.location.href = "#viewer";
    }, 800);
}

function loadScene(index) {
    const scene = scenes[index];

    if (viewer) viewer.destroy();

    viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: scene.image,
        autoLoad: true
    });

    viewer.on('load', () => {
        scene.hotspots.forEach(hs => {
            viewer.addHotSpot({
                pitch: hs.pitch,
                yaw: hs.yaw,
                type: 'info',
                text: hs.title,
                URL: hs.link
            });
        });
    });
}

document.getElementById('voltarTopo').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.onload = init;
</script>

</body>
</html>
