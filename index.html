<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panorama Test</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a0f0a, #0b0604);
    color: #f5e6c8;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: linear-gradient(90deg, #2c140d, #1a0f0a);
    border-bottom: 2px solid #c89b3c;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #c89b3c;
}

nav a {
    color: #f5e6c8;
    margin-left: 25px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover { color: #e63946; }

/* HERO */
.hero {
    height: 40vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 42px;
    color: #c89b3c;
    text-shadow: 0 0 20px rgba(200,155,60,0.5);
}

/* SEÇÃO */
.secao {
    padding: 50px;
    max-width: 1200px;
    margin: auto;
}

.secao h2 {
    text-align: center;
    color: #c89b3c;
    margin-bottom: 20px;
}

/* PANORAMA */
#panorama {
    width: 100%;
    height: 500px;
    border-radius: 15px;
    border: 2px solid #c89b3c;
    box-shadow: 0 0 30px rgba(200,155,60,0.3);
}

/* BOTÕES */
.scene-selector {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.scene-btn {
    padding: 10px 18px;
    background: linear-gradient(135deg, #c89b3c, #8b5e1a);
    border: none;
    color: #000;
    cursor: pointer;
    border-radius: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.scene-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(200,155,60,0.6);
}

/* BOTÃO TOPO (MAIOR) */
#voltarTopo {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #c89b3c;
    border: none;
    padding: 18px;
    font-size: 20px;
    border-radius: 50%;
    cursor: pointer;
    color: #000;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(200,155,60,0.6);
    transition: 0.3s;
}

#voltarTopo:hover {
    transform: scale(1.15);
    background: #e63946;
}

/* EFEITO DE FUNDO */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(200,155,60,0.05), transparent 70%);
    pointer-events: none;
}
</style>
</head>

<body id="topo">

<header>
    <div class="logo">🌍 Panorama Test</div>
    <nav>
        <a href="#topo">Início</a>
        <a href="#viewer">Explorar</a>
    </nav>
</header>

<section class="hero">
    <h1>Museu de Exposições</h1>
</section>

<section id="viewer" class="secao">
    <h2>Explorar Ambientes</h2>

    <div class="scene-selector" id="sceneSelector"></div>

    <div id="panorama"></div>
</section>

<button id="voltarTopo">↑</button>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
const scenes = [
    {
        name: "Espaço 1",
        image: "https://i.postimg.cc/rwfXz5wh/panorama-01.jpg",
        hotspots: [
            { title: "Modelo 3D", link: "https://sketchfab.com", pitch: 0, yaw: 45 }
        ]
    },
    {
        name: "Espaço 2",
        image: "https://i.postimg.cc/SsTJrndH/panorama-02.jpg",
        hotspots: [
            { title: "Explorar", link: "https://exemplo.com", pitch: 10, yaw: 90 }
        ]
    },
    {
        name: "Espaço 3",
        image: "https://i.postimg.cc/pLfrSGkY/panorama-03.jpg",
        hotspots: []
    }
];

let viewer = null;

function init() {
    const selector = document.getElementById('sceneSelector');

    scenes.forEach((scene, i) => {
        const btn = document.createElement('button');
        btn.className = 'scene-btn';
        btn.textContent = scene.name;
        btn.onclick = () => loadScene(i);
        selector.appendChild(btn);
    });

    loadScene(0);
}

function loadScene(index) {
    const scene = scenes[index];

    if (viewer) viewer.destroy();

    viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: scene.image,
        autoLoad: true
    });

    viewer.on('load', () => {
        scene.hotspots.forEach(hs => {
            viewer.addHotSpot({
                pitch: hs.pitch,
                yaw: hs.yaw,
                type: 'info',
                text: hs.title,
                URL: hs.link
            });
        });
    });
}

document.getElementById('voltarTopo').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.onload = init;
</script>

</body>
</html>
