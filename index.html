<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Virtual 360°</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial;
    background: #0f0f1e;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: #111;
}

.logo { font-size: 22px; color: #00bfff; }

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

.hero {
    height: 40vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.secao {
    padding: 40px;
    max-width: 1200px;
    margin: auto;
}

#panorama {
    width: 100%;
    height: 500px;
    border-radius: 10px;
}

.scene-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.scene-btn {
    padding: 8px 15px;
    background: #00bfff;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

#voltarTopo {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00bfff;
    border: none;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body id="topo">

<header>
    <div class="logo">🌍 Tour Virtual</div>
    <nav>
        <a href="#topo">Home</a>
        <a href="#viewer">Visualizador</a>
    </nav>
</header>

<section class="hero">
    <h1>Tour 360°</h1>
</section>

<section id="viewer" class="secao">
    <h2>Visualizador</h2>

    <div class="scene-selector" id="sceneSelector"></div>

    <div id="panorama"></div>
</section>

<button id="voltarTopo">↑</button>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
// CENAS
const scenes = [
    {
        name: "Panorama 1",
        image: "https://i.postimg.cc/rwfXz5wh/panorama-01.jpg",
        hotspots: [
            { title: "Modelo 3D 1", link: "https://sketchfab.com", pitch: 0, yaw: 45 },
            { title: "Modelo 3D 2", link: "https://sketchfab.com", pitch: -20, yaw: 180 }
        ]
    },
    {
        name: "Panorama 2",
        image: "https://i.postimg.cc/SsTJrndH/panorama-02.jpg",
        hotspots: [
            { title: "Clique aqui", link: "https://exemplo.com", pitch: 10, yaw: 90 }
        ]
    },
    {
        name: "Panorama 3",
        image: "https://i.postimg.cc/pLfrSGkY/panorama-03.jpg",
        hotspots: []
    }
	
];

let viewer = null;

// INICIAR
function init() {
    const selector = document.getElementById('sceneSelector');

    scenes.forEach((scene, i) => {
        const btn = document.createElement('button');
        btn.className = 'scene-btn';
        btn.textContent = scene.name;
        btn.onclick = () => loadScene(i);
        selector.appendChild(btn);
    });

    loadScene(0);
}

// CARREGAR CENA
function loadScene(index) {
    const scene = scenes[index];

    if (viewer) viewer.destroy();

    viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: scene.image,
        autoLoad: true
    });

    viewer.on('load', () => {
        scene.hotspots.forEach(hs => {
            viewer.addHotSpot({
                pitch: hs.pitch,
                yaw: hs.yaw,
                type: 'info',
                text: hs.title,
                URL: hs.link
            });
        });
    });
}

// BOTÃO VOLTAR TOPO
document.getElementById('voltarTopo').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.onload = init;
</script>

</body>
</html>
